services:
  internal-dns:
    image: coredns/coredns
    container_name: internal-dns
    networks:
      sandbox-internal:
        ipv4_address: 172.28.0.53
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
    command: ["-conf", "/etc/coredns/Corefile"]
    restart: unless-stopped

  egress-proxy:
    image: vimagick/tinyproxy
    container_name: egress-proxy
    volumes:
      - ./tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./tinyproxy-filter:/etc/tinyproxy/filter:ro
    networks:
      sandbox-internal:
      proxy-external:
    restart: unless-stopped

  opencode-sandbox:
    build:
      context: .
      dockerfile: Dockerfile_sandbox-v4
    container_name: opencode-backend
    runtime: runsc
    working_dir: /workspace
    depends_on:
      - egress-proxy
      - internal-dns
    dns: 172.28.0.53
    volumes:
      - ./resolv.conf:/etc/resolv.conf:ro
      - ~/.config/opencode:/home/node/.config/opencode:rw
      - ~/.config/gh:/home/node/.config/gh:rw
      - ~/.opencode:/home/node/.opencode:rw
      - ~/.claude:/home/node/.claude:rw
      - ~/.local/share/opencode:/home/node/.local/share/opencode:rw
      - ${AICLI_WORKSPACE:-.}:/workspace:rw
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HOST_UID=${HOST_UID:-1002}
      - HOST_GID=${HOST_GID:-1002}
      - XDG_CONFIG_HOME=/home/node/.config
      - XDG_DATA_HOME=/home/node/.local/share
      - XDG_STATE_HOME=/home/node/.local/state
      - SQLITE_LOCKING_MODE=EXCLUSIVE
      - SQLITE_JOURNAL_MODE=TRUNCATE
      - HTTP_PROXY=http://egress-proxy:8888
      - HTTPS_PROXY=http://egress-proxy:8888
      - http_proxy=http://egress-proxy:8888
      - https_proxy=http://egress-proxy:8888
      - NO_PROXY=localhost,127.0.0.1
    ports:
      - "4096:4096"
    networks:
      sandbox-internal:
      host-access:

networks:
  sandbox-internal:
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  proxy-external:
    driver: bridge
  host-access:
    driver: bridge
    internal: false
